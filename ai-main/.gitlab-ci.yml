image: python:3.11

stages:
  - test
  - sonar

test_job:
  stage: test
  variables:
    PYTHONPATH: "."  
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-flask 
    - mkdir -p samples
    - echo "Ejecutando pruebas unitarias..."
    - python -m pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing tests/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 hour
  only:
    - merge_requests
    - main
    - branches

sonar_job:
  stage: sonar
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs: ["test_job"]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
      - sonar-scanner -Dsonar.projectKey=pbl52_ai -Dsonar.organization=pbl52 -Dsonar.sources=. -Dsonar.python.coverage.reportPaths=coverage.xml -Dsonar.exclusions="tests/**,**/__pycache__/**,dataset/**,dataset_balanced/**,venv/**" -Dsonar.qualitygate.wait=true
  allow_failure: false
  only:
    - merge_requests
    - main
    - branches